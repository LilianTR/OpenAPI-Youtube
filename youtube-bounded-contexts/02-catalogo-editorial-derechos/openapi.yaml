openapi: 3.1.0
info:
  title: Catálogo Editorial y Derechos
  version: 1.0.0
  description: |
    ## Responsabilidad
    Definir **qué contenido existe públicamente**, cómo se presenta y bajo qué
    reglas puede mostrarse (legal, territorial, etaria, moderación).

    ## Alcance
    - **Sí:** canales, metadata editorial, publicación, playlists, derechos, restricciones
    - **No:** transcoding, ranking de recomendaciones, comentarios, facturación

    ## Modelo canónico
    El "video" en este contexto es un **ítem de catálogo**: tiene título,
    descripción, tags, categoría y reglas de visibilidad. No conoce el archivo
    técnico más allá de su `videoAssetId` de referencia.

    ## Integración con otros contextos
    - Consume el evento `AssetReadyForPublication` de **Publicación** (contiene
      `videoAssetId` y `creatorId`). Al recibirlo, este contexto puede crear
      el ítem editorial correspondiente en estado `draft`.
    - Antes de crear un ítem, verifica síncronamente vía
      `GET /assets/{videoAssetId}` en **Publicación** que `processingStatus = completed`.
      Si el asset no está listo, rechaza la creación con `409 Conflict`.
    - Emite `ContentPublished`, `ContentUnpublished`, `ContentRestricted` consumidos
      por **Descubrimiento**, **Monetización** y **Publicidad**.

servers:
  - url: https://api.youtube-platform.internal/catalog/v1
    description: Servidor interno de Catálogo

security:
  - BearerAuth: []

tags:
  - name: channels
    description: Gestión de canales y su información pública # (RF-C1)
  - name: catalog-items
    description: Creación, edición y publicación de contenido editorial # (RF-C2, RF-C3)
  - name: playlists
    description: Colecciones ordenadas de contenido # (RF-C4)
  - name: rights
    description: Reclamaciones de derechos sobre contenido # (RF-C5)
  - name: policies
    description: Políticas, restricciones y moderación # (RF-C6)

paths:

  # ── CHANNELS ─────────────────────────────────────────────────────────────

  /channels:
    post:
      tags: [channels]
      operationId: createChannel
      summary: Crear un canal asociado a un creador # (RF-C1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '201':
          description: Canal creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /channels/{channelId}:
    parameters:
      - $ref: '#/components/parameters/channelId'
    get:
      tags: [channels]
      operationId: getChannel
      summary: Consultar información pública del canal # (RF-C1)
      security: []   # Endpoint público, no requiere autenticación
      responses:
        '200':
          description: Información del canal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [channels]
      operationId: updateChannel
      summary: Actualizar información del canal # (RF-C1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelRequest'
      responses:
        '200':
          description: Canal actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /channels/{channelId}/content:
    parameters:
      - $ref: '#/components/parameters/channelId'
    get:
      tags: [channels]
      operationId: listChannelContent
      summary: Listar contenido publicado de un canal (RF-C1)
      security: []   # Público; el filtro de visibilidad lo aplica la lógica interna
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - in: query
          name: status
          schema:
            type: string
            enum: [published, unlisted]
            default: published
      responses:
        '200':
          description: Lista de ítems de catálogo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItemList'

  # ── CATALOG ITEMS ─────────────────────────────────────────────────────────

  /catalog-items:
    post:
      tags: [catalog-items]
      operationId: createCatalogItem
      summary: Vincular asset técnico con metadata editorial # (RF-C2)
      description: |
        Recibe el `videoAssetId` de Publicación y los datos editoriales.
        El ítem se crea en estado `draft` por defecto.

        **Validación síncrona previa:** antes de crear el ítem, este contexto
        consulta `GET /assets/{videoAssetId}` en **Publicación** para verificar
        que `processingStatus = completed`. Si el asset no existe o su estado
        no es `completed`, se rechaza la operación con `409 Conflict`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCatalogItemRequest'
      responses:
        '201':
          description: Ítem de catálogo creado en borrador
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: El asset no existe en Publicación o su processingStatus no es completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /catalog-items/{catalogItemId}:
    parameters:
      - $ref: '#/components/parameters/catalogItemId'
    get:
      tags: [catalog-items]
      operationId: getCatalogItem
      summary: Consultar un ítem de catálogo # (RF-C2)
      security: []
      responses:
        '200':
          description: Ítem de catálogo con restricciones activas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [catalog-items]
      operationId: updateCatalogItem
      summary: Editar metadata editorial de un ítem # (RF-C2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCatalogItemRequest'
      responses:
        '200':
          description: Ítem actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /catalog-items/{catalogItemId}/publish:
    parameters:
      - $ref: '#/components/parameters/catalogItemId'
    post:
      tags: [catalog-items]
      operationId: publishCatalogItem
      summary: Publicar un contenido # (RF-C3)
      description: |
        Hace el contenido visible según las reglas de visibilidad definidas.
        Emite el evento `ContentPublished` hacia Descubrimiento, Monetización y Publicidad.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRequest'
      responses:
        '200':
          description: Contenido publicado; se emite evento ContentPublished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /catalog-items/{catalogItemId}/unpublish:
    parameters:
      - $ref: '#/components/parameters/catalogItemId'
    post:
      tags: [catalog-items]
      operationId: unpublishCatalogItem
      summary: Despublicar u ocultar contenido # (RF-C3)
      description: |
        Retira el contenido de la vista pública.
        Emite el evento `ContentUnpublished` hacia contextos consumidores.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnpublishRequest'
      responses:
        '200':
          description: Contenido despublicado; se emite evento ContentUnpublished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /catalog-items/{catalogItemId}/visibility-check:
    parameters:
      - $ref: '#/components/parameters/catalogItemId'
    get:
      tags: [catalog-items]
      operationId: checkVisibility
      summary: Verificar visibilidad de un ítem para un usuario dado # (RF-C3)
      description: |
        Consulta síncrona utilizada por otros contextos (Descubrimiento, Publicidad)
        para validar si un ítem es visible según país, edad del usuario y
        estado de moderación. No requiere autenticación ya que la usan otros servicios.
      security: []
      parameters:
        - in: query
          name: userId
          schema:
            type: string
        - in: query
          name: country
          required: true
          schema:
            type: string
            description: Código ISO 3166-1 alpha-2
            pattern: '^[A-Z]{2}$'
        - in: query
          name: userAgeYears
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Resultado de la verificación de visibilidad
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisibilityCheckResult'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── PLAYLISTS ─────────────────────────────────────────────────────────────

  /playlists:
    post:
      tags: [playlists]
      operationId: createPlaylist
      summary: Crear una colección ordenada de contenidos # (RF-C4)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaylistRequest'
      responses:
        '201':
          description: Playlist creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /playlists/{playlistId}:
    parameters:
      - $ref: '#/components/parameters/playlistId'
    get:
      tags: [playlists]
      operationId: getPlaylist
      summary: Consultar una playlist con su orden # (RF-C4)
      security: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Playlist con ítems ordenados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [playlists]
      operationId: deletePlaylist
      summary: Eliminar una playlist # (RF-C4)
      responses:
        '204':
          description: Playlist eliminada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /playlists/{playlistId}/items:
    parameters:
      - $ref: '#/components/parameters/playlistId'
    post:
      tags: [playlists]
      operationId: addItemToPlaylist
      summary: Agregar ítem a una playlist # (RF-C4)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPlaylistItemRequest'
      responses:
        '201':
          description: Ítem agregado a la playlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /playlists/{playlistId}/items/{catalogItemId}:
    parameters:
      - $ref: '#/components/parameters/playlistId'
      - in: path
        name: catalogItemId
        required: true
        schema:
          type: string
    delete:
      tags: [playlists]
      operationId: removeItemFromPlaylist
      summary: Quitar ítem de una playlist # (RF-C4)
      responses:
        '200':
          description: Ítem removido; playlist actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /playlists/{playlistId}/reorder:
    parameters:
      - $ref: '#/components/parameters/playlistId'
    put:
      tags: [playlists]
      operationId: reorderPlaylist
      summary: Reordenar todos los ítems de una playlist # (RF-C4)
      description: |
        Recibe la lista completa de `catalogItemId` en el nuevo orden deseado.
        Reemplazar un ítem a la vez con `newPosition` es frágil ante
        peticiones concurrentes; este enfoque es atómico.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderPlaylistRequest'
      responses:
        '200':
          description: Playlist con el nuevo orden aplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── RIGHTS ────────────────────────────────────────────────────────────────

  /rights-claims:
    post:
      tags: [rights]
      operationId: createRightsClaim
      summary: Registrar una reclamación de derechos # (RF-C5)
      description: |
        Si `autoRestrictContent` es true, el sistema aplica automáticamente
        una restricción de visibilidad al ítem y emite el evento
        `ContentRestricted` hacia los contextos consumidores.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRightsClaimRequest'
      responses:
        '201':
          description: Reclamación creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RightsClaim'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /catalog-items/{catalogItemId}/rights-claims:
    parameters:
      - $ref: '#/components/parameters/catalogItemId'
    get:
      tags: [rights]
      operationId: listRightsClaims
      summary: Listar reclamaciones sobre un ítem de catálogo # (RF-C5)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - in: query
          name: status
          schema:
            type: string
            enum: [open, accepted, disputed, withdrawn]
      responses:
        '200':
          description: Lista de reclamaciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RightsClaimList'
        '404':
          $ref: '#/components/responses/NotFound'

  /rights-claims/{claimId}:
    parameters:
      - in: path
        name: claimId
        required: true
        schema:
          type: string
    get:
      tags: [rights]
      operationId: getRightsClaim
      summary: Consultar una reclamación de derechos # (RF-C5)
      responses:
        '200':
          description: Detalle de la reclamación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RightsClaim'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [rights]
      operationId: resolveRightsClaim
      summary: Resolver una reclamación (aceptar, disputar, retirar) # (RF-C5)
      description: |
        Al resolver una reclamación se emite el evento `RightsClaimResolved`.
        Si la resolución es `withdrawn` o `disputed`, se puede levantar
        la restricción de visibilidad que se aplicó automáticamente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveRightsClaimRequest'
      responses:
        '200':
          description: Reclamación resuelta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RightsClaim'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── POLICIES ──────────────────────────────────────────────────────────────

  /catalog-items/{catalogItemId}/policy:
    parameters:
      - $ref: '#/components/parameters/catalogItemId'
    get:
      tags: [policies]
      operationId: getContentPolicy
      summary: Consultar estado de moderación y política actual # (RF-C6)
      description: |
        Devuelve el estado consolidado de moderación y las restricciones
        vigentes del ítem. Equivale al "estado de política actual" que
        pide el enunciado.
      security: []
      responses:
        '200':
          description: Estado de moderación y restricciones activas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentPolicy'
        '404':
          $ref: '#/components/responses/NotFound'

  /catalog-items/{catalogItemId}/policy/restrictions:
    parameters:
      - $ref: '#/components/parameters/catalogItemId'
    post:
      tags: [policies]
      operationId: applyRestriction
      summary: Aplicar una restricción de contenido # (RF-C6)
      description: |
        Aplica una restricción específica (edad, geo-bloqueo, monetización, etc.).
        Emite el evento `RestrictionApplied`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyRestrictionRequest'
      responses:
        '200':
          description: Restricción aplicada; política actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentPolicy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /catalog-items/{catalogItemId}/policy/restrictions/{restrictionId}:
    parameters:
      - $ref: '#/components/parameters/catalogItemId'
      - in: path
        name: restrictionId
        required: true
        schema:
          type: string
    delete:
      tags: [policies]
      operationId: liftRestriction
      summary: Levantar una restricción específica de un contenido # (RF-C6)
      description: Emite el evento `RestrictionLifted` hacia contextos consumidores.
      responses:
        '200':
          description: Restricción levantada; política actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /catalog-items/{catalogItemId}/policy/history:
    parameters:
      - $ref: '#/components/parameters/catalogItemId'
    get:
      tags: [policies]
      operationId: getPolicyHistory
      summary: Historial de cambios de política de un contenido # (RF-C6)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Historial paginado de cambios de política
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyHistoryList'
        '404':
          $ref: '#/components/responses/NotFound'

# ---------------------------------------------------------------------------
# COMPONENTS
# ---------------------------------------------------------------------------
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT emitido por el servicio de identidad

  parameters:
    channelId:
      in: path
      name: channelId
      required: true
      schema:
        type: string
    catalogItemId:
      in: path
      name: catalogItemId
      required: true
      schema:
        type: string
    playlistId:
      in: path
      name: playlistId
      required: true
      schema:
        type: string
    page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Solicitud mal formada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Token ausente o inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Sin permisos para esta operación
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Operación no válida para el estado actual del recurso
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "ITEM_ALREADY_PUBLISHED"
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    # ── Channel ──

    CreateChannelRequest:
      type: object
      required: [creatorId, name]
      properties:
        creatorId:
          type: string
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        thumbnailUrl:
          type: string
          format: uri
        bannerUrl:
          type: string
          format: uri

    UpdateChannelRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        thumbnailUrl:
          type: string
          format: uri
        bannerUrl:
          type: string
          format: uri

    Channel:
      type: object
      required: [channelId, creatorId, name, createdAt]
      properties:
        channelId:
          type: string
        creatorId:
          type: string
        name:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: string
          format: uri
        bannerUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── CatalogItem ──

    CreateCatalogItemRequest:
      type: object
      required: [channelId, videoAssetId, title]
      properties:
        channelId:
          type: string
        videoAssetId:
          type: string
          description: Referencia al asset técnico en el contexto de Publicación
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        tags:
          type: array
          items:
            type: string
          maxItems: 30
        categoryId:
          type: string
        thumbnailUrl:
          type: string
          format: uri
        language:
          type: string
          example: "es"

    UpdateCatalogItemRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        tags:
          type: array
          items:
            type: string
          maxItems: 30
        categoryId:
          type: string
        thumbnailUrl:
          type: string
          format: uri
        language:
          type: string

    PublishRequest:
      type: object
      properties:
        visibility:
          type: string
          enum: [public, unlisted]
          default: public
          description: Nivel de visibilidad al publicar
        scheduledAt:
          type: string
          format: date-time
          description: Si se especifica, el contenido se publicará en esa fecha/hora

    UnpublishRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          enum: [creator_request, policy_violation, rights_claim, system]
          description: Motivo de la despublicación (requerido para auditoría)
        notes:
          type: string
          description: Notas adicionales opcionales

    CatalogItem:
      type: object
      required: [catalogItemId, channelId, videoAssetId, title, status, createdAt]
      properties:
        catalogItemId:
          type: string
        channelId:
          type: string
        videoAssetId:
          type: string
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        categoryId:
          type: string
        thumbnailUrl:
          type: string
          format: uri
        language:
          type: string
        status:
          type: string
          enum: [draft, published, unlisted, unpublished]
        visibility:
          type: string
          enum: [public, unlisted]
        activeRestrictions:
          type: array
          description: Restricciones de política vigentes sobre este ítem
          items:
            $ref: '#/components/schemas/Restriction'
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CatalogItemList:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

    VisibilityCheckResult:
      type: object
      required: [catalogItemId, isVisible]
      properties:
        catalogItemId:
          type: string
        isVisible:
          type: boolean
        reasons:
          type: array
          items:
            type: string
            enum: [unpublished, geo_blocked, age_restricted, moderation_hold, rights_claim]
          description: Razones por las que el contenido no es visible (vacío si isVisible=true)

    # ── Playlist ──

    CreatePlaylistRequest:
      type: object
      required: [channelId, title]
      properties:
        channelId:
          type: string
        title:
          type: string
          maxLength: 150
        description:
          type: string
          maxLength: 1000
        visibility:
          type: string
          enum: [public, unlisted, private]
          default: public

    AddPlaylistItemRequest:
      type: object
      required: [catalogItemId]
      properties:
        catalogItemId:
          type: string
        position:
          type: integer
          minimum: 0
          description: Posición deseada (0 = inicio). Si se omite, se agrega al final.

    ReorderPlaylistRequest:
      type: object
      required: [orderedItemIds]
      properties:
        orderedItemIds:
          type: array
          description: |
            Lista completa de catalogItemId en el nuevo orden deseado.
            Debe contener exactamente los mismos ítems que ya están en la playlist.
          items:
            type: string

    Playlist:
      type: object
      required: [playlistId, channelId, title, items, createdAt]
      properties:
        playlistId:
          type: string
        channelId:
          type: string
        title:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [public, unlisted, private]
        items:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlaylistItem:
      type: object
      required: [catalogItemId, position]
      properties:
        catalogItemId:
          type: string
        position:
          type: integer
        addedAt:
          type: string
          format: date-time

    # ── Rights ──

    CreateRightsClaimRequest:
      type: object
      required: [catalogItemId, claimantId, claimType]
      properties:
        catalogItemId:
          type: string
        claimantId:
          type: string
          description: Entidad o persona que realiza la reclamación
        claimType:
          type: string
          enum: [copyright, trademark, privacy]
        description:
          type: string
        autoRestrictContent:
          type: boolean
          default: false
          description: |
            Si es true, aplica automáticamente una restricción de visibilidad
            al ítem y emite el evento ContentRestricted (RF-C5).

    ResolveRightsClaimRequest:
      type: object
      required: [resolution]
      properties:
        resolution:
          type: string
          enum: [accepted, disputed, withdrawn]
        reason:
          type: string
        liftRestriction:
          type: boolean
          default: false
          description: |
            Si es true y la reclamación tenía una restricción asociada,
            la levanta automáticamente al resolver.

    RightsClaim:
      type: object
      required: [claimId, catalogItemId, claimantId, claimType, status, createdAt]
      properties:
        claimId:
          type: string
        catalogItemId:
          type: string
        claimantId:
          type: string
        claimType:
          type: string
          enum: [copyright, trademark, privacy]
        status:
          type: string
          enum: [open, accepted, disputed, withdrawn]
        description:
          type: string
        resolution:
          type: string
        restrictionApplied:
          type: boolean
          description: Indica si se aplicó una restricción de visibilidad por esta reclamación
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time

    RightsClaimList:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RightsClaim'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # ── Policies ──

    Restriction:
      type: object
      required: [restrictionId, type, appliedAt]
      properties:
        restrictionId:
          type: string
        type:
          type: string
          enum: [age_restriction, geo_block, monetization_limit, moderation_hold]
        minAgeYears:
          type: integer
          description: Edad mínima (presente si type=age_restriction)
        blockedCountries:
          type: array
          items:
            type: string
            pattern: '^[A-Z]{2}$'
          description: Países bloqueados (presente si type=geo_block)
        reason:
          type: string
        appliedAt:
          type: string
          format: date-time

    ApplyRestrictionRequest:
      type: object
      required: [type, reason]
      properties:
        type:
          type: string
          enum: [age_restriction, geo_block, monetization_limit, moderation_hold]
        minAgeYears:
          type: integer
          minimum: 0
          description: Requerido si type=age_restriction
        blockedCountries:
          type: array
          items:
            type: string
            pattern: '^[A-Z]{2}$'
          description: Requerido si type=geo_block
        reason:
          type: string

    ContentPolicy:
      type: object
      required: [catalogItemId, moderationStatus, activeRestrictions, updatedAt]
      properties:
        catalogItemId:
          type: string
        moderationStatus:
          type: string
          enum: [approved, under_review, restricted, removed]
          description: Estado de moderación actual del contenido
        activeRestrictions:
          type: array
          items:
            $ref: '#/components/schemas/Restriction'
        updatedAt:
          type: string
          format: date-time

    PolicyHistoryEntry:
      type: object
      required: [entryId, catalogItemId, changeType, changedAt, changedBy]
      properties:
        entryId:
          type: string
        catalogItemId:
          type: string
        changeType:
          type: string
          enum: [restriction_applied, restriction_lifted, moderation_status_changed, published, unpublished]
        changedAt:
          type: string
          format: date-time
        changedBy:
          type: string
          description: ID del actor (usuario, sistema, servicio) que realizó el cambio
        previousState:
          type: object
          additionalProperties: true
          description: Estado de política antes del cambio
        newState:
          type: object
          additionalProperties: true
          description: Estado de política después del cambio

    PolicyHistoryList:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PolicyHistoryEntry'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Pagination:
      type: object
      required: [page, pageSize, totalItems]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer
